name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# All steps run via npm run scripts defined in package.json.
# Replace placeholder scripts with your project's actual commands:
#   lint  → eslint src --ext .ts
#   test  → jest --coverage
#   build → tsc --noEmit && vite build (or whatever your stack uses)

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Audit
        run: npm audit --audit-level=high

  notify-failure:
    name: Post Copilot Debug Prompt
    runs-on: ubuntu-latest
    needs: [lint, test, build, security]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post debug prompt as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ CI Failed

            One or more CI gates failed on this PR. To fix with Copilot:

            1. Open Copilot Chat in VS Code
            2. Switch to the **debug** chatmode
            3. Paste this prompt:

            \`\`\`
            CI failed on PR #${{ github.event.pull_request.number }}.
            Run: npm test -- --verbose
            Paste the full error output and use @debugger to find the root cause.
            \`\`\`

            **Failed gates:** Check the Actions tab for the exact error output.

            > Tip: Use the \`debug\` chatmode for systematic root-cause analysis.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
